openapi: 3.0.3
info:
  title: Banking Transaction Platform — App 1 Ingestion Service (Internal Admin API)
  description: |
    **App 1 — Ingestion Service** for the Banking Transaction Platform.

    This service is the **entry point** of the platform. Its primary interface is
    a Kafka consumer (`transaction.file.ready`), not HTTP. This OpenAPI spec documents
    the **internal admin/monitoring REST endpoints** only — exposed exclusively within
    the cluster for operational visibility (health, file status, manual retries).

    > **No external exposure.** These endpoints must NOT be published to the public API
    > gateway. Access is restricted to internal network / service mesh only.

    ### Processing flow
    ```
    Kafka: transaction.file.ready
      → Duplicate check (SHA-256)
      → Parse (TXT fixed-width / CSV / JSON / XML)
      → Validate rows (V01–V29)
      → Persist → PostgreSQL (transactions, accounts, warnings)
               → MongoDB   (file_uploads, processing_logs)
      → Kafka: transaction.file.processed
    ```

    ### File format
    Fixed-width TXT files with three record types: **HEADER (H)**, **DETAIL (D)**,
    **TRAILER (T)**. Each line is 300 characters, UTF-8, LF-terminated.
    Amounts are stored as integer cents in the file and divided by 100 before
    persisting / responding.

    ### Validation rules
    - **V01–V10**: File-level checks (fail the entire file on any violation).
    - **V11–V24**: Row-level checks (skip row, log warning, continue).
    - **V25–V29**: Reconciliation checks (log warning, do not fail the file).

    ### Kafka events (not part of this API)
    | Topic | Direction | Description |
    |-------|-----------|-------------|
    | `transaction.file.ready` | Inbound | Upstream signals a file is ready |
    | `transaction.file.processed` | Outbound | Published after processing (success or failure) |

  version: 1.0.0
  contact:
    name: Banking Platform Team

servers:
  - url: http://localhost:8081/internal/v1
    description: Local development
  - url: http://ingestion-svc.bank.internal/internal/v1
    description: Staging / Production (cluster-internal only)

tags:
  - name: files
    description: |
      Ingested file lifecycle — metadata, status, and manual retry.
      Data is read from MongoDB (`file_uploads`, `processing_logs`) and
      cross-referenced with PostgreSQL (`ingested_files`).
  - name: transactions
    description: |
      Read-only view of transactions persisted by this service.
      For full query capabilities use App 2 (Query API).
  - name: health
    description: Service health and dependency status.

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ── Health ────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [health]
      summary: Service health check
      description: |
        Returns the health status of the service and all its dependencies:
        PostgreSQL, MongoDB, and Kafka (producer + consumer).
        Used by Kubernetes liveness / readiness probes.
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy (all dependencies UP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: UP
                postgres: UP
                mongo: UP
                kafka_consumer: UP
                kafka_producer: UP
        '503':
          description: Service is unhealthy (one or more dependencies DOWN)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: DEGRADED
                postgres: UP
                mongo: DOWN
                kafka_consumer: UP
                kafka_producer: UP

  # ── Files ─────────────────────────────────────────────────────────────────

  /files:
    get:
      tags: [files]
      summary: List ingested files
      description: |
        Returns paginated metadata for all files known to the ingestion service,
        sourced from MongoDB `file_uploads`. Supports filtering by status,
        ingestion date range, and uploader.
      operationId: listFiles
      parameters:
        - $ref: '#/components/parameters/FileStatusFilter'
        - $ref: '#/components/parameters/IngestionDateFrom'
        - $ref: '#/components/parameters/IngestionDateTo'
        - name: uploadedBy
          in: query
          description: Filter by operator or service ID that triggered ingestion.
          schema:
            type: string
            maxLength: 30
            example: "operator-42"
        - name: fileFormat
          in: query
          description: Filter by file format.
          schema:
            $ref: '#/components/schemas/FileFormat'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated list of file metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilePage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /files/{fileId}:
    get:
      tags: [files]
      summary: Get file detail and processing log
      description: |
        Returns the full metadata of an ingested file together with the
        row-level processing log stored in MongoDB `processing_logs`.

        The `processingLog` array contains one entry per phase per row
        (PARSE → VALIDATE → PERSIST → ENRICH). Failed rows include
        `lineNumber` and a `data` map with the rejected field/value.
      operationId: getFileById
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: File detail with full processing log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /files/{fileId}/retry:
    post:
      tags: [files]
      summary: Retry processing a failed file
      description: |
        Re-publishes a `FileReadyEvent` to the `transaction.file.ready` Kafka topic
        for a file that previously ended in status `FAILED`.

        **Preconditions:**
        - File must exist and have status `FAILED`.
        - A `DUPLICATE` or `COMPLETED` file cannot be retried.

        The service will re-read the file from the original `filePath`, run all
        validations again, and publish a new `FileProcessedEvent` upon completion.
        The previous processing log is preserved and a new run is appended.
      operationId: retryFile
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryRequest'
      responses:
        '202':
          description: Retry accepted — processing is asynchronous
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Conflict — file is not in a retryable state.
            Only FAILED files can be retried.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                timestamp: "2024-03-15T10:00:00Z"
                status: 409
                error: "Conflict"
                message: "File 3fa85f64-5717-4562-b3fc-2c963f66afa6 has status COMPLETED and cannot be retried"
                path: "/internal/v1/files/3fa85f64-5717-4562-b3fc-2c963f66afa6/retry"
        '500':
          $ref: '#/components/responses/InternalError'

  /files/{fileId}/warnings:
    get:
      tags: [files]
      summary: List validation warnings for a file
      description: |
        Returns all row-level validation warnings recorded in
        `transaction_validation_warnings` (PostgreSQL) for the transactions
        belonging to this file.

        These are non-fatal warnings generated during V11–V24 checks.
        Rows that triggered a warning were still persisted if at least the
        required fields were valid; rows that failed hard validation were
        skipped entirely and appear only in the MongoDB processing log.
      operationId: listFileWarnings
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
        - name: warningCode
          in: query
          description: Filter by machine-readable warning code (e.g. MISSING_DESCRIPTION).
          schema:
            type: string
            example: "MISSING_DESCRIPTION"
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Paginated list of validation warnings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationWarningPage'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  # ── Transactions (read-only, ingestion scope) ─────────────────────────────

  /files/{fileId}/transactions:
    get:
      tags: [transactions]
      summary: List transactions ingested from a specific file
      description: |
        Returns the transactions that were successfully persisted to PostgreSQL
        from the given file. This is a lightweight view scoped to a single file.

        For cross-file queries, aggregations, and CBU/CUIT searches use the
        **App 2 Query API** (`GET /api/v1/transactions`).
      operationId: listTransactionsByFile
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
        - name: status
          in: query
          description: Filter by transaction status.
          schema:
            $ref: '#/components/schemas/TransactionStatus'
        - name: flagged
          in: query
          description: "true: return only flagged transactions."
          schema:
            type: boolean
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionPage'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /files/{fileId}/transactions/{transactionId}:
    get:
      tags: [transactions]
      summary: Get a single transaction ingested from a specific file
      description: |
        Returns the full detail of one transaction, including account parties
        and validation warnings. Scoped to the given file for authorization
        purposes (the transaction must belong to the file).
      operationId: getTransactionByFile
      parameters:
        - $ref: '#/components/parameters/FileIdPath'
        - name: transactionId
          in: path
          required: true
          description: Internal UUID of the transaction (transactions.id).
          schema:
            type: string
            format: uuid
            example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: Transaction found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────

components:

  # ── Reusable parameters ───────────────────────────────────────────────────

  parameters:

    FileIdPath:
      name: fileId
      in: path
      required: true
      description: Internal UUID of the file (ingested_files.id / MongoDB _id).
      schema:
        type: string
        format: uuid
        example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"

    FileStatusFilter:
      name: status
      in: query
      description: Filter by file processing status.
      schema:
        $ref: '#/components/schemas/FileStatus'

    IngestionDateFrom:
      name: ingestionDateFrom
      in: query
      description: |
        Filter files processed on or after this date.
        Applies to `ingested_files.processed_at`. Format `yyyy-MM-dd`.
      schema:
        type: string
        format: date
        example: "2024-03-01"

    IngestionDateTo:
      name: ingestionDateTo
      in: query
      description: |
        Filter files processed on or before this date.
        Applies to `ingested_files.processed_at`. Format `yyyy-MM-dd`.
      schema:
        type: string
        format: date
        example: "2024-03-31"

    Page:
      name: page
      in: query
      description: Zero-based page number.
      schema:
        type: integer
        default: 0
        minimum: 0

    Size:
      name: size
      in: query
      description: Records per page (max 100).
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    Sort:
      name: sort
      in: query
      description: "Sort field and direction. Example: `uploadedAt,desc`"
      schema:
        type: string
        default: "uploadedAt,desc"
        example: "uploadedAt,desc"

  # ── Responses ─────────────────────────────────────────────────────────────

  responses:

    BadRequest:
      description: Invalid request parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            timestamp: "2024-03-15T10:00:00Z"
            status: 400
            error: "Bad Request"
            message: "ingestionDateFrom must not be after ingestionDateTo"
            path: "/internal/v1/files"

    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            timestamp: "2024-03-15T10:00:00Z"
            status: 404
            error: "Not Found"
            message: "File 3fa85f64-5717-4562-b3fc-2c963f66afa6 not found"
            path: "/internal/v1/files/3fa85f64-5717-4562-b3fc-2c963f66afa6"

    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  # ── Schemas ───────────────────────────────────────────────────────────────

  schemas:

    # ── Enums ──────────────────────────────────────────────────────────────

    FileStatus:
      type: string
      description: |
        Lifecycle status of an ingested file.
        - `RECEIVED`   — Kafka event consumed, file not yet processed.
        - `PROCESSING` — Currently being parsed and validated.
        - `COMPLETED`  — All valid rows persisted. May have `failedRows > 0`.
        - `FAILED`     — File-level validation failed (V01–V10) or all rows rejected.
        - `DUPLICATE`  — SHA-256 matches a previously ingested file (V10).
      enum: [RECEIVED, PROCESSING, COMPLETED, FAILED, DUPLICATE]
      example: COMPLETED

    FileFormat:
      type: string
      description: Format of the source transaction file.
      enum: [TXT, CSV, JSON, XML]
      example: TXT

    TransactionType:
      type: string
      enum: [DEBIT, CREDIT, TRANSFER, PAYMENT, REFUND, FEE]
      example: DEBIT

    TransactionStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED, REVERSED]
      example: COMPLETED

    HolderType:
      type: string
      enum: [INDIVIDUAL, COMPANY]
      example: INDIVIDUAL

    LogLevel:
      type: string
      enum: [INFO, WARN, ERROR]

    ProcessingPhase:
      type: string
      description: |
        Phase of the ingestion pipeline that produced the log entry.
        - `PARSE`    — Fixed-width / CSV / JSON / XML tokenization.
        - `VALIDATE` — V11–V29 rule evaluation.
        - `PERSIST`  — PostgreSQL batch insert.
        - `ENRICH`   — Account resolution / auto-creation.
      enum: [PARSE, VALIDATE, PERSIST, ENRICH]

    # ── Kafka events (documented for reference, not HTTP payloads) ──────────

    FileReadyEvent:
      description: |
        Inbound Kafka event — published by the upstream file-upload service to
        topic `transaction.file.ready` (group `ingestion-svc`, ack `MANUAL_IMMEDIATE`).
        Documented here for reference; not an HTTP request body.
      type: object
      required:
        - eventId
        - filePath
        - fileName
        - fileFormat
        - checksum
        - fileSizeBytes
        - uploadedBy
        - uploadedAt
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique event ID used for idempotency checks.
        filePath:
          type: string
          description: Path or URI from which App 1 reads the file.
          example: "/mnt/files/incoming/transaction_example_20240315.txt"
        fileName:
          type: string
          description: Original filename as provided by the uploader.
          example: "transaction_example_20240315.txt"
        fileFormat:
          $ref: '#/components/schemas/FileFormat'
        checksum:
          type: string
          description: SHA-256 hex of the file — used for duplicate detection (V10).
          example: "a3f5c9d1e2b4f6a8c0e1d3b5f7a9c2e4d6f8b0a2c4e6f8a0b2d4f6a8c0e2d4f6"
        fileSizeBytes:
          type: integer
          format: int64
          description: File size in bytes. Max 500 MB (configurable).
          example: 204800
        branchCode:
          type: string
          description: Originating branch identifier (matches HEADER.branch_code).
          example: "BR-042"
        uploadedBy:
          type: string
          description: Operator or service that triggered the upload.
          example: "operator-42"
        uploadedAt:
          type: string
          format: date-time
          description: UTC timestamp when the file was uploaded.
          example: "2024-03-15T09:05:00Z"

    FileProcessedEvent:
      description: |
        Outbound Kafka event — published by App 1 to topic
        `transaction.file.processed` after every ingestion attempt (success or failure).
        Message key is `fileId` (UUID string) for per-file ordering.
        Producer settings: `acks=all`, idempotent, 3 retries.
        Documented here for reference; not an HTTP response body.
      type: object
      required:
        - eventId
        - fileId
        - fileName
        - status
        - processedAt
      properties:
        eventId:
          type: string
          format: uuid
          description: Unique event ID.
        fileId:
          type: string
          format: uuid
          description: Matches ingested_files.id in PostgreSQL and _id in MongoDB.
        fileName:
          type: string
          example: "transaction_example_20240315.txt"
        status:
          $ref: '#/components/schemas/FileStatus'
        totalRows:
          type: integer
          description: Total DETAIL rows declared in the TRAILER record.
        successRows:
          type: integer
          description: Rows successfully persisted to PostgreSQL.
        failedRows:
          type: integer
          description: Rows skipped due to row-level validation failure (V11–V24).
        flaggedCount:
          type: integer
          description: Rows where flagged = Y.
        processedAt:
          type: string
          format: date-time
          description: UTC timestamp when App 1 finished processing.
          example: "2024-03-15T09:05:22Z"
        errorMessage:
          type: string
          nullable: true
          description: Set when status is FAILED — summary of the file-level error.
          example: "V08 checksum mismatch: expected a3f5c9... got b8d2f1..."

    # ── File schemas ────────────────────────────────────────────────────────

    FileMetadata:
      description: |
        Metadata of an ingested file, sourced from MongoDB `file_uploads`
        and cross-referenced with PostgreSQL `ingested_files`.
      type: object
      required: [id, fileName, fileFormat, status, checksum, uploadedBy, uploadedAt]
      properties:
        id:
          type: string
          format: uuid
          description: |
            Shared primary key: matches `ingested_files.id` in PostgreSQL
            and `_id` in MongoDB.
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        fileName:
          type: string
          example: "transaction_example_20240315.txt"
        fileFormat:
          $ref: '#/components/schemas/FileFormat'
        status:
          $ref: '#/components/schemas/FileStatus'
        checksum:
          type: string
          description: |
            SHA-256 hex of the file content.
            For TXT format this equals HEADER.checksum (first 59 hex chars of the
            SHA-256 of all DETAIL lines concatenated, per spec v1.0 constraint).
          example: "a3f5c9d1e2b4f6a8c0e1d3b5f7a9c2e4d6f8b0a2c4e6f8a0b2d4f6a8c0e2d4f6"
        fileSizeBytes:
          type: integer
          format: int64
          example: 204800
        totalRows:
          type: integer
          description: Total DETAIL records declared in TRAILER.total_detail_lines.
          example: 3
        successRows:
          type: integer
          description: Rows successfully persisted to PostgreSQL.
          example: 2
        failedRows:
          type: integer
          description: Rows skipped due to hard validation failure.
          example: 1
        flaggedRows:
          type: integer
          description: DETAIL rows where flagged = Y.
          example: 1
        branchCode:
          type: string
          description: Originating branch (from HEADER.branch_code).
          example: "BR-042"
        uploadedBy:
          type: string
          description: Operator or service that triggered ingestion.
          example: "operator-42"
        uploadedAt:
          type: string
          format: date-time
          description: When the FileReadyEvent was consumed.
          example: "2024-03-15T09:05:00Z"
        processedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            When App 1 finished processing. Null while status is RECEIVED or PROCESSING.
            This value is propagated to `transactions.ingested_at` for every
            transaction in this file.
          example: "2024-03-15T09:05:22Z"
        errorMessage:
          type: string
          nullable: true
          description: |
            File-level error description. Populated only when status is FAILED.
            Corresponds to the failing validation rule (e.g. "V08 checksum mismatch").
          example: null

    FileDetail:
      description: |
        Full file view including the row-level processing log from MongoDB.
        Each entry in `processingLog` corresponds to one pipeline event
        (PARSE, VALIDATE, PERSIST, or ENRICH) for a specific row.
      allOf:
        - $ref: '#/components/schemas/FileMetadata'
        - type: object
          properties:
            headerRecord:
              $ref: '#/components/schemas/FileHeaderRecord'
            trailerRecord:
              $ref: '#/components/schemas/FileTrailerRecord'
            processingLog:
              type: array
              description: |
                Ordered list of log entries produced during ingestion.
                Sourced from MongoDB `processing_logs`.
              items:
                $ref: '#/components/schemas/ProcessingLogEntry'

    FileHeaderRecord:
      description: |
        Parsed fields from the HEADER (H) record of the TXT file.
        Populated only for TXT format files.
      type: object
      properties:
        fileVersion:
          type: string
          description: File format version (must be "0100" per V09).
          example: "0100"
        originSystem:
          type: string
          description: System that generated the file (HEADER pos 42–61).
          example: "BRANCH_TERMINAL"
        branchCode:
          type: string
          example: "BR-042"
        generatedBy:
          type: string
          example: "svc-ingestion"
        generatedAt:
          type: string
          format: date-time
          example: "2024-03-15T09:05:22Z"
        periodFrom:
          type: string
          format: date
          example: "2024-03-01"
        periodTo:
          type: string
          format: date
          example: "2024-03-31"
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          example: "USD"
        totalRecords:
          type: integer
          description: HEADER.total_records — must match TRAILER.total_detail_lines (V04).
          example: 3
        checksum:
          type: string
          description: SHA-256 hex declared in the HEADER (validated against computed hash, V08).
          example: "a3f5c9d1e2b4..."

    FileTrailerRecord:
      description: |
        Parsed and validated fields from the TRAILER (T) record of the TXT file.
        Populated only for TXT format files.
      type: object
      properties:
        totalDetailLines:
          type: integer
          description: Must equal count of D lines in the file (V04).
          example: 3
        totalAmountCents:
          type: integer
          format: int64
          description: Sum of all DETAIL amount_cents (V25 reconciliation).
          example: 9500000
        totalDebitCents:
          type: integer
          format: int64
          description: Sum of DETAIL amount_cents where type = DEBIT (V26).
          example: 2500000
        totalCreditCents:
          type: integer
          format: int64
          description: Sum where type = CREDIT (V27).
          example: 0
        totalTransferCents:
          type: integer
          format: int64
          description: Sum where type = TRANSFER (V28).
          example: 5000000
        totalFlagged:
          type: integer
          description: Count of DETAIL rows with flagged = Y (V29).
          example: 1
        periodFrom:
          type: string
          format: date
          description: Must match HEADER.period_from (V06).
          example: "2024-03-01"
        periodTo:
          type: string
          format: date
          description: Must match HEADER.period_to (V07).
          example: "2024-03-31"
        fileId:
          type: string
          format: uuid
          description: Must match HEADER.file_id (V05).
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"

    ProcessingLogEntry:
      description: |
        Single entry in the row-level processing log (MongoDB `processing_logs`).
        One file may have thousands of entries — one per pipeline event per row.
      type: object
      required: [timestamp, level, phase, message]
      properties:
        timestamp:
          type: string
          format: date-time
          example: "2024-03-15T09:05:10Z"
        level:
          $ref: '#/components/schemas/LogLevel'
        phase:
          $ref: '#/components/schemas/ProcessingPhase'
        message:
          type: string
          example: "Row skipped: benefactor_cbu must be exactly 22 digits (V19)"
        lineNumber:
          type: integer
          nullable: true
          description: |
            1-based DETAIL record line number in the source TXT file
            (excludes the HEADER line). Null for file-level log entries.
          example: 3
        data:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Structured context for the log entry. Common keys:
            - `field` — name of the rejected field
            - `rejectedValue` — raw value as read from the file
            - `validationRule` — rule code (e.g. "V19")
            - `externalRef` — external_ref of the row if available
          example:
            field: "benefactor_cbu"
            rejectedValue: "0000031000123"
            validationRule: "V19"
            externalRef: "TNX-2024-000003"

    FilePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/FileMetadata'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 124
        totalPages:
          type: integer
          example: 7
        last:
          type: boolean
          example: false

    # ── Retry ───────────────────────────────────────────────────────────────

    RetryRequest:
      description: Optional body for the retry endpoint.
      type: object
      properties:
        reason:
          type: string
          maxLength: 200
          description: Optional human-readable reason for the manual retry (audit trail).
          example: "Database was unreachable during original processing — retrying after recovery"
        triggeredBy:
          type: string
          maxLength: 30
          description: Operator or service initiating the retry. Defaults to the calling service.
          example: "operator-42"

    RetryResponse:
      type: object
      required: [fileId, status, message]
      properties:
        fileId:
          type: string
          format: uuid
          example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        status:
          type: string
          enum: [ACCEPTED]
          example: ACCEPTED
        message:
          type: string
          example: "File queued for reprocessing. Monitor status at GET /internal/v1/files/3fa85f64-5717-4562-b3fc-2c963f66afa6"
        kafkaEventId:
          type: string
          format: uuid
          description: eventId of the re-published FileReadyEvent.

    # ── Transaction schemas ─────────────────────────────────────────────────

    AccountParty:
      description: Compact account view embedded in transaction responses.
      type: object
      required: [id, cbu, cuit, holderName]
      properties:
        id:
          type: string
          format: uuid
          description: Internal account UUID (accounts.id).
        accountNumber:
          type: string
          description: Internal account number (e.g. ACC-00123).
          example: "ACC-00123"
        cbu:
          type: string
          description: 22-digit Argentine bank identifier (benefactor_cbu / beneficiary_cbu in the file).
          pattern: '^\d{22}$'
          example: "0000003100012345678901"
        cuit:
          type: string
          description: 11-digit Argentine tax identifier (benefactor_cuit / beneficiary_cuit in the file).
          pattern: '^\d{11}$'
          example: "20301234567"
        holderName:
          type: string
          description: Full name of the account holder (benefactor_name / beneficiary_name, max 40 chars).
          example: "Alice Martinez"
        holderType:
          $ref: '#/components/schemas/HolderType'
        bankCode:
          type: string
          description: BIC or CBU prefix identifying the bank.
          example: "310"
        branchCode:
          type: string
          example: "BR-042"

    Transaction:
      description: Transaction list item — compact view persisted from a DETAIL row.
      type: object
      required: [id, transactionAt, ingestedAt, type, status, amount, currency, benefactor, beneficiary]
      properties:
        id:
          type: string
          format: uuid
          description: Internal UUID (transactions.id).
        externalRef:
          type: string
          description: |
            Bank reference from the source file (external_ref, pos 2–31, max 30 chars).
            Unique within the file (V12).
          example: "TNX-2024-000001"
        transactionAt:
          type: string
          format: date-time
          description: |
            When the transaction occurred (UTC). Parsed from DETAIL.transaction_at
            (YYYYMMDDHHMMSS). Must not be in the future (V13) and must fall within
            HEADER.period_from – period_to (V14).
          example: "2024-03-15T09:00:00Z"
        ingestedAt:
          type: string
          format: date-time
          description: When App 1 finished processing the file (equals FileMetadata.processedAt).
          example: "2024-03-15T09:05:22Z"
        type:
          $ref: '#/components/schemas/TransactionType'
        status:
          $ref: '#/components/schemas/TransactionStatus'
        amount:
          type: number
          format: double
          description: |
            Decimal amount (amount_cents ÷ 100). amount_cents is stored as integer
            in the file (15 digits, zero-padded) and in the database.
          example: 250.00
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code (V18 validated).
          example: "USD"
        benefactor:
          $ref: '#/components/schemas/AccountParty'
        beneficiary:
          $ref: '#/components/schemas/AccountParty'
        description:
          type: string
          description: Free text from the file (pos 227–276, max 50 chars). May be null (generates MISSING_DESCRIPTION warning).
          example: "ATM withdrawal"
        fileId:
          type: string
          format: uuid
          description: The ingested file this transaction came from.
        createdBy:
          type: string
          description: Operator or service that uploaded the file (propagated from FileReadyEvent.uploadedBy).
          example: "operator-42"
        flagged:
          type: boolean
          description: true if DETAIL.flagged = Y (V24 validated).
        flagReason:
          type: string
          nullable: true
          description: Reason for the flag. Populated by enrichment logic after ingestion.
          example: "Amount exceeds account 30-day average by 720%"

    TransactionDetail:
      description: Full transaction view including validation warnings.
      allOf:
        - $ref: '#/components/schemas/Transaction'
        - type: object
          properties:
            createdAt:
              type: string
              format: date-time
              description: Row creation timestamp in PostgreSQL.
            updatedAt:
              type: string
              format: date-time
            validationWarnings:
              type: array
              description: |
                Non-fatal warnings recorded during ingestion for this row
                (transaction_validation_warnings table). The row was persisted
                despite these warnings.
              items:
                $ref: '#/components/schemas/ValidationWarning'

    ValidationWarning:
      type: object
      required: [id, transactionId, warningCode, warningMessage, createdAt]
      properties:
        id:
          type: string
          format: uuid
        transactionId:
          type: string
          format: uuid
        warningCode:
          type: string
          description: Machine-readable warning code.
          example: "MISSING_DESCRIPTION"
        warningMessage:
          type: string
          example: "Optional field 'description' was empty"
        createdAt:
          type: string
          format: date-time

    ValidationWarningPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ValidationWarning'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 5
        totalPages:
          type: integer
          example: 1
        last:
          type: boolean
          example: true

    TransactionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 3
        totalPages:
          type: integer
          example: 1
        last:
          type: boolean
          example: true

    # ── Health ──────────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [UP, DOWN, DEGRADED]
          description: |
            Overall service status.
            - `UP` — all dependencies healthy.
            - `DEGRADED` — service operational but at least one non-critical dependency is DOWN.
            - `DOWN` — service cannot process files (critical dependency unavailable).
          example: UP
        postgres:
          type: string
          enum: [UP, DOWN]
          description: PostgreSQL connectivity (critical — DOWN means service is DOWN).
          example: UP
        mongo:
          type: string
          enum: [UP, DOWN]
          description: MongoDB connectivity (critical — audit log unavailable).
          example: UP
        kafka_consumer:
          type: string
          enum: [UP, DOWN]
          description: Kafka consumer group `ingestion-svc` on topic `transaction.file.ready`.
          example: UP
        kafka_producer:
          type: string
          enum: [UP, DOWN]
          description: Kafka producer on topic `transaction.file.processed` (acks=all, idempotent).
          example: UP

    # ── Error ───────────────────────────────────────────────────────────────

    ApiError:
      type: object
      required: [timestamp, status, error, path]
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "ingestionDateFrom must not be after ingestionDateTo"
        path:
          type: string
          example: "/internal/v1/files"
        details:
          type: array
          description: Field-level validation errors.
          items:
            type: object
            properties:
              field:
                type: string
                example: "status"
              rejectedValue:
                type: string
                example: "INVALID_STATUS"
              message:
                type: string
                example: "must be one of: RECEIVED, PROCESSING, COMPLETED, FAILED, DUPLICATE"
