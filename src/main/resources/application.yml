server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: ingestion-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/banking}
    username: ${DB_USERNAME:banking}
    password: ${DB_PASSWORD:banking}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: banking
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    schemas: banking
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/banking_audit}
      database: banking_audit

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ingestion-svc
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.bank.ingestion.adapter.inbound.kafka.event"
        spring.json.value.default.type: "com.bank.ingestion.adapter.inbound.kafka.event.FileReadyEvent"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    listener:
      ack-mode: MANUAL_IMMEDIATE

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

app:
  ingestion:
    max-file-size-bytes: 524288000
    max-detail-lines: 1000000
    idempotency-ttl-hours: 24
    batch:
      chunk-size: 500
      retry-attempts: 3
      retry-backoff-ms: 2000
    kafka:
      file-ready-topic: transaction.file.ready
      file-processed-topic: transaction.file.processed
      consumer-group: ingestion-svc

logging:
  level:
    com.bank.ingestion: INFO
    org.springframework.kafka: WARN
    org.springframework.batch: WARN
