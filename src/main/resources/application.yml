spring:
  application:
    name: ingestion-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/banking}
    username: ${POSTGRES_USER:banking}
    password: ${POSTGRES_PASSWORD:banking}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: banking
    show-sql: false
    open-in-view: false

  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/ingestion}

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: banking
    baseline-on-migrate: true

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

app:
  ingestion:
    max-file-size-bytes: 524288000   # 500 MB
    max-detail-lines: 1000000
    batch:
      chunk-size: 500
      retry-attempts: 3
      retry-backoff-ms: 2000
