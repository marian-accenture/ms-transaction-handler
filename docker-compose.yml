services:

  # ──────────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: banking-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: banking
      POSTGRES_USER: banking
      POSTGRES_PASSWORD: banking
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banking -d banking"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - banking-net

  # ──────────────────────────────────────────────
  # MongoDB 7
  # ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: banking-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: banking_audit
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - banking-net

  # ──────────────────────────────────────────────
  # Apache Kafka 3.7 (KRaft — no Zookeeper)
  # ──────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: banking-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft mode
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093

      # Listeners: PLAINTEXT for app, CONTROLLER for internal KRaft
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Topics
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1

      # Producer defaults
      KAFKA_CFG_MIN_INSYNC_REPLICAS: 1
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - banking-net

  # ──────────────────────────────────────────────
  # Kafka topic initializer (runs once, then exits)
  # ──────────────────────────────────────────────
  kafka-init:
    image: bitnami/kafka:3.7
    container_name: banking-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transaction.file.ready \
          --partitions 3 \
          --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic transaction.file.processed \
          --partitions 3 \
          --replication-factor 1
        echo "Topics created."
    networks:
      - banking-net

volumes:
  postgres-data:
  mongodb-data:
  kafka-data:

networks:
  banking-net:
    driver: bridge
